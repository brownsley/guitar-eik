spring:
    output:
        ansi:
            enabled: always
    datasource:
        url: ${DB_URL}
        username: ${DB_USER}
        password: ${DB_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
            connection-timeout: 30000
            maximum-pool-size: 5
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true

server:
    port: 9090
